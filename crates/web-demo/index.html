<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ferrule playground</title>
  <!-- wasm-opt stays off: older binaryen builds corrupt the externref
       table modern wasm-bindgen emits (WebAssembly.Table.grow errors). -->
  <link data-trunk rel="rust" data-wasm-opt="0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #121416;
      color: #e5e7eb;
      font-family: ui-monospace, "JetBrains Mono", "Fira Code", monospace;
    }
    #demo_canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }
    .loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      pointer-events: none;
    }
    .loader .ring {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 4px solid #374151;
      border-top-color: #22c55e;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { color: #9ca3af; font-size: 14px; }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="ring"></div>
    <p>loading the ferrule engine (WebAssembly)…</p>
  </div>
  <canvas id="demo_canvas"></canvas>
  <script type="module">
    const check = setInterval(() => {
      const canvas = document.getElementById("demo_canvas");
      if (canvas?.dataset.ferruleReady === "true") {
        document.getElementById("loader")?.remove();
        clearInterval(check);
      }
    }, 250);
  </script>
</body>
</html>
